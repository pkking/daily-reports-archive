name: Update Action Stats
on:
  workflow_run:
    workflows: ["Send Daily Reports via Email"]
    types: [completed]

permissions:
  contents: write
  actions: read

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          path: main

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Data Update
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p main/public
          cp gh-pages/data.json main/public/data.json || echo "[]" > main/public/data.json
          cd main
          node scripts/update_stats.js
          cp public/data.json ../gh-pages/data.json

      - name: Commit and Push to gh-pages
        working-directory: ./gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git commit -m "chore: update action stats data [skip ci]" || exit 0
          git push
